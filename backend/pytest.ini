[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --cov=.
    --cov-report=term-missing
    --cov-fail-under=60
filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning
env =
    TESTING=true

[coverage:run]
source = .
omit =
    tests/*
    test_data/*
    */__pycache__/*
